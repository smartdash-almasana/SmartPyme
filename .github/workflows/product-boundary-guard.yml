name: Product Boundary Guard

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  check-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run product boundary guard
        run: python scripts/guard_product_boundaries.py
