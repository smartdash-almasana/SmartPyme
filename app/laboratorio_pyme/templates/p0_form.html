<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laboratorio Operativo PyME — SmartPyme</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }
    h1 { font-size: 1.25rem; color: #111; margin-bottom: .25rem; }
    .subtitle { font-size: .875rem; color: #666; margin-bottom: 1.5rem; }
    label { display: block; font-size: .875rem; font-weight: 600; color: #333; margin-bottom: .25rem; }
    input, select, textarea {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: .9rem;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
    }
    textarea { resize: vertical; min-height: 80px; }
    button[type="submit"] {
      width: 100%;
      padding: .65rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button[type="submit"]:hover { background: #1d4ed8; }
    button[type="submit"]:disabled { background: #93c5fd; cursor: not-allowed; }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 4px;
      font-size: .875rem;
    }
    .result.success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
    }
    .result.error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }
    .result table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
    .result td { padding: .25rem .5rem; vertical-align: top; }
    .result td:first-child { font-weight: 600; white-space: nowrap; width: 40%; }
    .hidden { display: none; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Laboratorio Operativo PyME</h1>
    <p class="subtitle">Cargá un hallazgo y generá un caso cerrado con reporte persistido.</p>

    <form id="p0-form" novalidate>
      <label for="cliente_id">ID de cliente</label>
      <input
        id="cliente_id" name="cliente_id" type="text"
        placeholder="ej: cliente_demo_001" required
        autocomplete="off"
        value="cliente_demo_form"
      />

      <label for="dueno_nombre">Nombre del dueño</label>
      <input
        id="dueno_nombre" name="dueno_nombre" type="text"
        placeholder="ej: Juan García" required
        value="Dueño Demo Form"
      />

      <label for="laboratorio">Laboratorio</label>
      <select id="laboratorio" name="laboratorio" required>
        <option value="">— seleccionar —</option>
        <option value="diagnostico_operativo" selected>Diagnóstico operativo</option>
        <option value="analisis_comercial">Análisis comercial</option>
        <option value="analisis_stock">Análisis de stock</option>
        <option value="analisis_financiero">Análisis financiero</option>
        <option value="analisis_compras">Análisis de compras</option>
        <option value="analisis_automatizacion">Análisis de automatización</option>
      </select>

      <label for="hallazgo">Hallazgo inicial</label>
      <textarea
        id="hallazgo" name="hallazgo"
        placeholder="Describí el síntoma o problema principal que observás en la empresa."
        required
      >Primer hallazgo demo desde formulario P0</textarea>

      <button type="submit" id="submit-btn">Ejecutar Laboratorio P0</button>
    </form>

    <div id="result-box" class="result hidden"></div>
  </div>

  <script>
    const form = document.getElementById('p0-form');
    const btn  = document.getElementById('submit-btn');
    const box  = document.getElementById('result-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Validación básica
      const fields = ['cliente_id', 'dueno_nombre', 'laboratorio', 'hallazgo'];
      for (const f of fields) {
        if (!form[f].value.trim()) {
          showError('Todos los campos son obligatorios.');
          form[f].focus();
          return;
        }
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Ejecutando…';
      box.className = 'result hidden';
      box.innerHTML = '';

      const payload = {
        cliente_id:   form.cliente_id.value.trim(),
        dueno_nombre: form.dueno_nombre.value.trim(),
        laboratorio:  form.laboratorio.value,
        hallazgo:     form.hallazgo.value.trim(),
      };

      try {
        const resp = await fetch('/api/v1/laboratorio/p0/casos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await resp.json();

        if (!resp.ok) {
          showError(data.detail || `Error ${resp.status}`);
          return;
        }

        showSuccess(data);
      } catch (err) {
        showError('No se pudo conectar con el servidor. Verificá que esté corriendo.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ejecutar Laboratorio P0';
      }
    });

    function showSuccess(data) {
      box.className = 'result success';
      box.innerHTML = `
        <strong>✓ Caso creado correctamente</strong>
        <table>
          <tr><td>cliente_id</td><td>${esc(data.cliente_id)}</td></tr>
          <tr><td>case_id</td><td>${esc(data.case_id)}</td></tr>
          <tr><td>job_id</td><td>${esc(data.job_id)}</td></tr>
          <tr><td>report_id</td><td>${esc(data.report_id)}</td></tr>
          <tr><td>status</td><td><strong>${esc(data.status)}</strong></td></tr>
        </table>
      `;
    }

    function showError(msg) {
      box.className = 'result error';
      box.innerHTML = `<strong>✗ Error:</strong> ${esc(msg)}`;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
