<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laboratorio Operativo PyME — SmartPyme</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }
    h1 { font-size: 1.25rem; color: #111; margin-bottom: .25rem; }
    .subtitle { font-size: .875rem; color: #666; margin-bottom: 1.5rem; }
    label { display: block; font-size: .875rem; font-weight: 600; color: #333; margin-bottom: .25rem; }
    input, select, textarea {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: .9rem;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
    }
    textarea { resize: vertical; min-height: 80px; }
    button[type="submit"] {
      width: 100%;
      padding: .65rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button[type="submit"]:hover { background: #1d4ed8; }
    button[type="submit"]:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Result area ── */
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 6px;
      font-size: .875rem;
    }
    .result.success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
    }
    .result.error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }
    .result table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
    .result td { padding: .25rem .5rem; vertical-align: top; }
    .result td:first-child { font-weight: 600; white-space: nowrap; width: 40%; }
    .hidden { display: none; }

    /* ── Report card ── */
    .report-card {
      margin-top: 1rem;
      background: #fff;
      border: 1px solid #d1fae5;
      border-radius: 6px;
      overflow: hidden;
    }
    .report-card-header {
      background: #ecfdf5;
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .report-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #065f46;
      flex: 1;
    }
    .badge {
      display: inline-block;
      padding: .2rem .6rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .badge-closed  { background: #d1fae5; color: #065f46; }
    .badge-open    { background: #fef9c3; color: #713f12; }
    .badge-pending { background: #e0f2fe; color: #0c4a6e; }
    .badge-default { background: #f1f5f9; color: #475569; }

    /* ── Report grid ── */
    .report-grid {
      display: grid;
      grid-template-columns: 1fr;          /* mobile: 1 col */
      gap: .5rem;
      padding: .75rem 1rem;
    }
    @media (min-width: 480px) {
      .report-grid { grid-template-columns: 1fr 1fr; }  /* desktop: 2 col */
    }
    .report-field {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: .5rem .75rem;
    }
    .report-field-label {
      font-size: .7rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .15rem;
    }
    .report-field-value {
      font-size: .85rem;
      color: #1e293b;
      word-break: break-all;
    }

    /* ── Collapsible "Datos técnicos" ── */
    .collapsible-section {
      border-top: 1px solid #e2e8f0;
    }
    .collapsible-toggle {
      width: 100%;
      background: none;
      border: none;
      padding: .6rem 1rem;
      text-align: left;
      font-size: .8rem;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: background .15s;
    }
    .collapsible-toggle:hover { background: #f8fafc; }
    .collapsible-toggle .arrow {
      display: inline-block;
      transition: transform .2s;
      font-style: normal;
    }
    .collapsible-toggle[aria-expanded="true"] .arrow {
      transform: rotate(90deg);
    }
    .collapsible-body {
      padding: 0 1rem .75rem;
    }
    .json-block {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: .75rem;
      font-size: .78rem;
      font-family: ui-monospace, 'Cascadia Code', monospace;
      white-space: pre;
      overflow-x: auto;          /* scroll horizontal en mobile */
      color: #334155;
      max-height: 320px;
      overflow-y: auto;
    }

    /* ── Error card ── */
    .error-card {
      margin-top: 1rem;
      background: #fff;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      overflow: hidden;
    }
    .error-card-header {
      background: #fef2f2;
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .error-card-title {
      font-size: .95rem;
      font-weight: 700;
      color: #991b1b;
    }
    .error-card-message {
      padding: .6rem 1rem;
      font-size: .875rem;
      color: #7f1d1d;
    }

    /* ── Buttons ── */
    .btn-secondary {
      margin-top: 1rem;
      padding: .5rem 1rem;
      background: #f0f9ff;
      color: #0369a1;
      border: 1px solid #7dd3fc;
      border-radius: 4px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:hover { background: #e0f2fe; }
    .btn-secondary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Laboratorio Operativo PyME</h1>
    <p class="subtitle">Cargá un hallazgo y generá un caso cerrado con reporte persistido.</p>

    <form id="p0-form" novalidate>
      <label for="cliente_id">ID de cliente</label>
      <input
        id="cliente_id" name="cliente_id" type="text"
        placeholder="ej: cliente_demo_001" required
        autocomplete="off"
        value="cliente_demo_form"
      />

      <label for="dueno_nombre">Nombre del dueño</label>
      <input
        id="dueno_nombre" name="dueno_nombre" type="text"
        placeholder="ej: Juan García" required
        value="Dueño Demo Form"
      />

      <label for="laboratorio">Laboratorio</label>
      <select id="laboratorio" name="laboratorio" required>
        <option value="">— seleccionar —</option>
        <option value="diagnostico_operativo" selected>Diagnóstico operativo</option>
        <option value="analisis_comercial">Análisis comercial</option>
        <option value="analisis_stock">Análisis de stock</option>
        <option value="analisis_financiero">Análisis financiero</option>
        <option value="analisis_compras">Análisis de compras</option>
        <option value="analisis_automatizacion">Análisis de automatización</option>
      </select>

      <label for="hallazgo">Hallazgo inicial</label>
      <textarea
        id="hallazgo" name="hallazgo"
        placeholder="Describí el síntoma o problema principal que observás en la empresa."
        required
      >Primer hallazgo demo desde formulario P0</textarea>

      <button type="submit" id="submit-btn">Ejecutar Laboratorio P0</button>
    </form>

    <div id="result-box" class="result hidden"></div>
  </div>

  <script>
    const form = document.getElementById('p0-form');
    const btn  = document.getElementById('submit-btn');
    const box  = document.getElementById('result-box');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fields = ['cliente_id', 'dueno_nombre', 'laboratorio', 'hallazgo'];
      for (const f of fields) {
        if (!form[f].value.trim()) {
          showFormError('Todos los campos son obligatorios.');
          form[f].focus();
          return;
        }
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Ejecutando…';
      box.className = 'result hidden';
      box.innerHTML = '';

      const payload = {
        cliente_id:   form.cliente_id.value.trim(),
        dueno_nombre: form.dueno_nombre.value.trim(),
        laboratorio:  form.laboratorio.value,
        hallazgo:     form.hallazgo.value.trim(),
      };

      try {
        const resp = await fetch('/api/v1/laboratorio/p0/casos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await resp.json();

        if (!resp.ok) {
          showFormError(data.detail || `Error ${resp.status}`);
          return;
        }

        showCasoCreado(data);
      } catch (err) {
        showFormError('No se pudo conectar con el servidor. Verificá que esté corriendo.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ejecutar Laboratorio P0';
      }
    });

    /* ── Caso creado: tabla simple + botón consultar ── */
    function showCasoCreado(data) {
      box.className = 'result success';
      box.innerHTML = `
        <strong>✓ Caso creado correctamente</strong>
        <table>
          <tr><td>cliente_id</td><td>${esc(data.cliente_id)}</td></tr>
          <tr><td>case_id</td><td>${esc(data.case_id)}</td></tr>
          <tr><td>job_id</td><td>${esc(data.job_id)}</td></tr>
          <tr><td>report_id</td><td>${esc(data.report_id)}</td></tr>
          <tr><td>status</td><td><strong>${esc(data.status)}</strong></td></tr>
        </table>
        <button class="btn-secondary" id="btn-consultar-reporte" type="button">
          Consultar reporte
        </button>
        <div id="report-area"></div>
      `;

      document.getElementById('btn-consultar-reporte').addEventListener('click', () => {
        consultarReporte(data.report_id, data.cliente_id);
      });
    }

    /* ── Consultar reporte ── */
    async function consultarReporte(reportId, clienteId) {
      const btnConsultar = document.getElementById('btn-consultar-reporte');
      const reportArea   = document.getElementById('report-area');

      btnConsultar.disabled = true;
      btnConsultar.textContent = 'Consultando…';
      reportArea.innerHTML = '';

      try {
        const url = `/api/v1/laboratorio/p0/reportes/${encodeURIComponent(reportId)}?cliente_id=${encodeURIComponent(clienteId)}`;
        const resp = await fetch(url);
        const data = await resp.json();

        if (!resp.ok) {
          reportArea.innerHTML = buildErrorCard(
            data.detail || `Error ${resp.status}`,
            JSON.stringify(data, null, 2)
          );
        } else {
          reportArea.innerHTML = buildReportCard(data);
          // wire collapsible toggle
          const toggle = reportArea.querySelector('.collapsible-toggle');
          const body   = reportArea.querySelector('.collapsible-body');
          if (toggle && body) {
            toggle.addEventListener('click', () => {
              const expanded = toggle.getAttribute('aria-expanded') === 'true';
              toggle.setAttribute('aria-expanded', String(!expanded));
              body.classList.toggle('hidden', expanded);
            });
          }
        }
      } catch (err) {
        reportArea.innerHTML = buildErrorCard(
          'No se pudo consultar el reporte. Verificá que el servidor esté corriendo.',
          null
        );
      } finally {
        btnConsultar.disabled = false;
        btnConsultar.textContent = 'Consultar reporte';
      }
    }

    /* ── Build report card HTML ── */
    function buildReportCard(data) {
      const status     = data.status || '';
      const badgeClass = badgeForStatus(status);
      const fields = [
        { label: 'cliente_id', value: data.cliente_id },
        { label: 'case_id',    value: data.case_id    },
        { label: 'report_id',  value: data.report_id  },
        { label: 'status',     value: status          },
      ];

      const gridItems = fields.map(f => `
        <div class="report-field">
          <div class="report-field-label">${esc(f.label)}</div>
          <div class="report-field-value">${esc(String(f.value ?? '—'))}</div>
        </div>
      `).join('');

      const jsonPretty = esc(JSON.stringify(data, null, 2));

      return `
        <div class="report-card">
          <div class="report-card-header">
            <span class="report-card-title">Reporte confirmado</span>
            <span class="badge ${esc(badgeClass)}">${esc(status || 'sin estado')}</span>
          </div>
          <div class="report-grid">${gridItems}</div>
          <div class="collapsible-section">
            <button class="collapsible-toggle" type="button" aria-expanded="false">
              <span class="arrow">▶</span> Datos técnicos
            </button>
            <div class="collapsible-body hidden">
              <pre class="json-block">${jsonPretty}</pre>
            </div>
          </div>
        </div>
      `;
    }

    /* ── Build error card HTML ── */
    function buildErrorCard(message, detail) {
      const detailSection = detail ? `
        <div class="collapsible-section" style="border-top:1px solid #fca5a5;">
          <button class="collapsible-toggle" type="button" aria-expanded="false"
                  style="color:#991b1b;"
                  onclick="(function(btn){
                    var b=btn.nextElementSibling;
                    var exp=btn.getAttribute('aria-expanded')==='true';
                    btn.setAttribute('aria-expanded',String(!exp));
                    b.classList.toggle('hidden',exp);
                  })(this)">
            <span class="arrow">▶</span> Detalle técnico
          </button>
          <div class="collapsible-body hidden">
            <pre class="json-block" style="border-color:#fca5a5;">${esc(detail)}</pre>
          </div>
        </div>
      ` : '';

      return `
        <div class="error-card">
          <div class="error-card-header">
            <span>✗</span>
            <span class="error-card-title">Error al consultar el reporte</span>
          </div>
          <div class="error-card-message">${esc(message)}</div>
          ${detailSection}
        </div>
      `;
    }

    /* ── Form-level error (before report area exists) ── */
    function showFormError(msg) {
      box.className = 'result error';
      box.innerHTML = buildErrorCard(msg, null);
    }

    /* ── Badge class by status ── */
    function badgeForStatus(status) {
      const s = (status || '').toLowerCase();
      if (s === 'closed')  return 'badge-closed';
      if (s === 'open')    return 'badge-open';
      if (s === 'pending') return 'badge-pending';
      return 'badge-default';
    }

    /* ── HTML escape ── */
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
