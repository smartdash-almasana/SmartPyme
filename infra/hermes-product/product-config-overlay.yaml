model:
  provider: openrouter
  default: openrouter/owl-alpha
  base_url: https://openrouter.ai/api/v1

display:
  streaming: false

toolsets:
  - hermes-cli
  - mcp-smartpyme-product

terminal:
  backend: docker
  container_cpu: 1
  container_memory: 5120
  container_persistent: true
  cwd: /workspace
  docker_volumes:
    - /opt/smartpyme-factory/repos/SmartPyme:/workspace
    - /home/neoalmasana/.hermes-smartpyme-product/cache/documents:/output

mcp_servers:
  smartpyme_product:
    command: python3
    args:
      - /opt/smartpyme-factory/repos/SmartPyme/mcp_smartpyme_bridge.py
    env:
      PYTHONPATH: /opt/smartpyme-factory/repos/SmartPyme
      SMARTPYME_EVIDENCE_ROOT: /opt/smartpyme-factory/repos/SmartPyme/evidence_store
      SMARTPYME_CURATED_EVIDENCE_DB_PATH: /opt/smartpyme-factory/repos/SmartPyme/data/curated_evidence.db
    tools:
      include:
        # create_job REMOVIDO: un mensaje PyME inicial no puede crear jobs.
        # El flujo correcto es: TelegramAdapter → InitialLaboratoryAnamnesisService.
        # Hermes Producto es capa conversacional, no orquestador de jobs.
        - get_job_status
        - list_pending_validations
        - resolve_clarification
        - save_clarification
        - get_evidence
        - ingest_document
        - bem_submit_workflow
      prompts: false
      resources: false
