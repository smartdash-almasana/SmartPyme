task_id: environment_contract_python_001
mode: governance
status: done
human_required: false
objective: >
  Corregir el bloqueo BLOCKED_ENVIRONMENT_CONTRACT creando el contrato de entorno Python
  versionado de SmartPyme Factory. La tarea debe instalar y declarar las dependencias
  mínimas faltantes para validación canónica: alias/comando python, pytest, ruff/linter
  Python y polars. El cierre solo es válido si los comandos canónicos pasan o si queda
  documentado un bloqueo de instalación con causa exacta.
allowed_files:
  - pyproject.toml
  - requirements.txt
  - requirements-dev.txt
  - pytest.ini
  - ruff.toml
  - docs/factory/PYTHON_ENVIRONMENT_CONTRACT.md
  - scripts/check_python_environment.sh
  - scripts/install_python_environment.sh
  - scripts/hermes_factory_runner.py
  - factory/ai_governance/tasks/000_environment_contract_python_001.yaml
forbidden_files:
  - app/core/**
  - app/services/**
  - smartcounter_core/**
  - factory/evidence/**
  - factory/bugs/**
  - factory/control/AUDIT_GATE.md
  - factory/control/FACTORY_STATUS.md
  - factory/telegram_notify.py
required_tests:
  - python --version
  - python3 --version
  - python -m pytest --version
  - python -m ruff --version
  - python -c "import polars; print(polars.__version__)"
  - python -m pytest tests/factory/test_build_audit_context.py -q
  - python -m py_compile scripts/build_audit_context.py
  - python scripts/build_audit_context.py --output /tmp/smartpyme_audit_context_env_test.txt
acceptance_criteria:
  - Existe un contrato de entorno versionado en pyproject.toml o requirements-dev.txt.
  - pytest queda disponible mediante python -m pytest.
  - ruff queda disponible mediante python -m ruff.
  - polars queda importable desde python.
  - El comando python existe o queda instalado un alias/symlink documentado a python3.
  - La validación de scripts/build_audit_context.py pasa con python y pytest.
  - No se toca core de negocio ni servicios de aplicación.
  - Si alguna instalación falla, el veredicto debe ser BLOCKED_ENVIRONMENT_INSTALL con causa exacta y comando fallido.
preflight_commands:
  - git status --short
  - command -v python || true
  - command -v python3 || true
  - python --version || true
  - python3 --version || true
  - python -m pytest --version || true
  - python -m ruff --version || true
  - python -c "import polars; print(polars.__version__)" || true
post_commands:
  - python --version
  - python3 --version
  - python -m pytest --version
  - python -m ruff --version
  - python -c "import polars; print(polars.__version__)"
  - python -m pytest tests/factory/test_build_audit_context.py -q
  - python -m py_compile scripts/build_audit_context.py
  - python scripts/build_audit_context.py --output /tmp/smartpyme_audit_context_env_test.txt
  - git status --short
blocker:
  code: BLOCKED_ENVIRONMENT_INSTALL
  command: scripts/install_python_environment.sh
  cause: >
    pip cannot resolve pypi.org from this environment. ruff>=0.8 and polars>=1.0
    cannot be installed, and the canonical python command is still missing from PATH.
