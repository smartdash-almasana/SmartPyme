task_id: task-hermes-factory-task-loop-001
mode: governance_doc_update
status: done
human_required: false
objective: >
  Alinear la especificacion de loop de factoria con el runtime real vigente:
  scripts/hermes_factory_runner.py. La cola activa actual no es factory/hallazgos/*;
  es factory/ai_governance/tasks/*.yaml.

runtime_real:
  tipo: yaml_tasks_gobernadas_por_gate
  runner: scripts/hermes_factory_runner.py
  task_dir: factory/ai_governance/tasks
  task_pattern: "*.yaml"
  gate_file: factory/control/AUDIT_GATE.md
  status_file: factory/control/FACTORY_STATUS.md
  codex_runner: scripts/codex_builder_runner.py
  post_cycle: scripts/factory_post_cycle_control.py
  telegram_notify: factory/telegram_notify.py

unidad_activa:
  tipo: tarea_yaml_gobernada
  ubicacion: factory/ai_governance/tasks/*.yaml
  campos_minimos:
    - task_id
    - mode
    - status
    - objective
    - allowed_files
    - forbidden_files
    - forbidden_actions
    - acceptance_criteria
    - validation_commands
    - report_required

estados_reales:
  task_status:
    - pending
    - in_progress
    - done
    - blocked
    - rejected
  gate_status:
    allowed_to_run:
      - APPROVED
      - OPEN
      - RUN
    blocking:
      - WAITING_AUDIT
      - BLOCKED
      - HOLD
    special:
      - REJECTED
      - RUNNING

flujo_real:
  - CYCLE_START
  - enforce_gate_before_dispatch
  - select_task desde factory/ai_governance/tasks/*.yaml
  - TASK_DISPATCH hacia scripts/codex_builder_runner.py
  - post_cycle_control
  - TASK_DONE si retorno cero
  - gate WAITING_AUDIT
  - CYCLE_OK o CYCLE_FAIL
  - auto_commit_and_push solo si ciclo OK

regla_de_gate:
  - si gate esta en WAITING_AUDIT/BLOCKED/HOLD no hay dispatch
  - si gate esta en REJECTED se reabre la ultima tarea
  - al cerrar cualquier ciclo el gate vuelve a WAITING_AUDIT
  - ningun nuevo dispatch ocurre sin aprobacion humana o apertura explicita del gate

legacy_no_activo_en_este_runner:
  factory_hallazgos:
    rutas:
      - factory/hallazgos/pending
      - factory/hallazgos/in_progress
      - factory/hallazgos/done
      - factory/hallazgos/blocked
    decision: >
      Puede conservarse como antecedente o runtime alternativo historico, pero no debe ser
      presentado como cola activa de scripts/hermes_factory_runner.py.

scope:
  tipo: documentacion_gobernanza
  descripcion: >
    Esta tarea fija el contrato operativo real para que Hermes, Codex, Gemini y ChatGPT
    fabriquen specs, skills y tareas en la ubicacion correcta, con evidencia y gate humano.

allowed_files:
  - factory/ai_governance/tasks/task_loop_001.yaml
  - docs/SMARTPYME_OS_ACTUAL.md
  - docs/HERMES_MCP_RUNTIME.md
  - docs/ROADMAP_IMPLEMENTACION.md

forbidden_files:
  - scripts/hermes_factory_runner.py
  - scripts/codex_builder_runner.py
  - scripts/factory_post_cycle_control.py
  - factory/control/**
  - factory/evidence/**
  - app/**
  - core/**
  - services/**
  - tests/**

forbidden_actions:
  - modificar codigo Python
  - cambiar gate
  - disparar Codex desde esta tarea documental
  - cambiar systemd
  - cambiar Telegram
  - mover hallazgos reales
  - crear runtime paralelo

acceptance_criteria:
  - task_loop_001.yaml declara factory/ai_governance/tasks/*.yaml como cola activa
  - task_loop_001.yaml no presenta factory/hallazgos/* como runtime activo del runner Hermes
  - docs/SMARTPYME_OS_ACTUAL.md declara factory/ai_governance/tasks/*.yaml como cola activa del runner actual
  - docs/HERMES_MCP_RUNTIME.md declara factory/ai_governance/tasks/*.yaml como cola activa del runner actual
  - docs/ROADMAP_IMPLEMENTACION.md declara factory/ai_governance/tasks/*.yaml como cola activa del runner actual
  - las docs no presentan factory/hallazgos/* como cola activa de scripts/hermes_factory_runner.py
  - no se modifica codigo Python

validation_commands:
  - grep -R "TASKS_DIR\|factory/ai_governance/tasks" -n scripts/hermes_factory_runner.py factory/ai_governance/tasks/task_loop_001.yaml docs/SMARTPYME_OS_ACTUAL.md docs/HERMES_MCP_RUNTIME.md docs/ROADMAP_IMPLEMENTACION.md
  - git diff -- factory/ai_governance/tasks/task_loop_001.yaml docs/SMARTPYME_OS_ACTUAL.md docs/HERMES_MCP_RUNTIME.md docs/ROADMAP_IMPLEMENTACION.md
  - git status --short

report_required:
  - VEREDICTO
  - ARCHIVOS_MODIFICADOS
  - RUNTIME_REAL_ALINEADO
  - VALIDACION_EJECUTADA
  - SHA

block_resolution:
  obsolete_hallazgos_runtime:
    previous_assumption: "factory/hallazgos/* era la cola activa de la factoria Hermes actual."
    actual_repo_state: "scripts/hermes_factory_runner.py usa factory/ai_governance/tasks/*.yaml."
    decision: "Alinear docs/specs al runner real y degradar factory/hallazgos/* a antecedente o runtime alternativo no activo."
