---
version: "1.1.0"
created: "2026-04-28"
status: "CANONICO v1.1"
remediation: "P0-3"
---
verdict_enum:
  version: "1.1.0"
  description: "Vocabulario canonico de veredictos SmartPyme Factory"
  layers:
    builder:
      success: "BUILD_SUCCESS"
      failure: "BUILD_FAILED"
      blocked: "BUILD_BLOCKED"
      incomplete: "BUILD_INCOMPLETE"
    auditor:
      success: "AUDIT_PASSED"
      failure: "AUDIT_REJECTED"
      blocked: "AUDIT_BLOCKED"
      incomplete: "AUDIT_INCOMPLETE"
    director:
      approve: "APPROVED"
      reject: "REJECTED"
      block: "BLOCKED"
      defer: "NEEDS_REVIEW"
  cross_layer_mapping:
    BUILD_SUCCESS:
      next_state: "WAITING_AUDIT"
      next_agent: "auditor"
    AUDIT_PASSED:
      next_state: "AWAITING_HUMAN_MERGE"
      next_agent: "human"
    AUDIT_REJECTED:
      next_state: "BACK_TO_BUILD"
      next_agent: "builder"
      max_retries: 3
    AUDIT_BLOCKED:
      next_state: "ESCALATED"
      next_agent: "director"
    NEEDS_REVIEW:
      next_state: "ESCALATED"
      next_agent: "director"
    APPROVED:
      next_state: "MERGED"
      next_agent: "human"
    REJECTED:
      next_state: "ABANDONED"
  deprecated_aliases:
    - alias: "NO_VALIDADO"
      maps_to: "NEEDS_REVIEW"
      layer: "director"
      sunset_date: "2026-05-31"
      reason: "Alias historico del Director"
    - alias: "VALIDADO"
      maps_to: "AUDIT_PASSED"
      layer: "auditor"
    - alias: "CORRECTO"
      maps_to: "BUILD_SUCCESS"
      layer: "builder"
    - alias: "INCOMPLETO"
      maps_to: "BUILD_INCOMPLETE"
      layer: "builder"
    - alias: "OK"
      maps_to: "BUILD_SUCCESS"
      layer: "builder"
  migration_note: >
    Todo documento canonico nuevo del Director debe usar NEEDS_REVIEW.
    NO_VALIDADO queda permitido solo como alias legacy hasta sunset_date.
